name: Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref_type }}-${{ github.ref_name }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  actions: read
  contents: read

jobs:
  meta:
    name: Compute version metadata
    runs-on: ubuntu-latest
    outputs:
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_main: ${{ steps.meta.outputs.is_main }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Build version strings
        id: meta
        run: |
          is_tag=false
          is_main=false
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then is_tag=true; fi
          if [ "${GITHUB_REF_NAME:-}" = "main" ]; then is_main=true; fi
          ts=$(date -u +%Y%m%d%H%M%S)
          short_sha="${GITHUB_SHA::7}"
          if [ "$is_tag" = true ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="0.0.0-dev.${ts}.${short_sha}"
          fi
          echo "is_tag=$is_tag" >> "$GITHUB_OUTPUT"
          echo "is_main=$is_main" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  check:
    name: Build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Build
        run: mise run build
      - name: Test
        run: mise run test
      - name: Vet
        run: mise run vet

  build-binaries:
    name: Build ${{ matrix.product }} (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: [meta]
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: derpcat
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: derpcat-linux-amd64
          - product: derpcat
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            asset: derpcat-linux-arm64
          - product: derpcat
            runner: macos-latest
            goos: darwin
            goarch: amd64
            asset: derpcat-darwin-amd64
          - product: derpcat
            runner: macos-latest
            goos: darwin
            goarch: arm64
            asset: derpcat-darwin-arm64
          - product: derphole
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: derphole-linux-amd64
          - product: derphole
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            asset: derphole-linux-arm64
          - product: derphole
            runner: macos-latest
            goos: darwin
            goarch: amd64
            asset: derphole-darwin-amd64
          - product: derphole
            runner: macos-latest
            goos: darwin
            goarch: arm64
            asset: derphole-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Build
        run: |
          mkdir -p dist
          VERSION=${{ needs.meta.outputs.version }}
          COMMIT=${{ github.sha }}
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -trimpath \
              -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
              -o dist/${{ matrix.asset }} \
              ./cmd/${{ matrix.product }}
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release-prod:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [meta, check, build-binaries, publish-npm-prod]
    if: needs.meta.outputs.is_tag == 'true'
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Download build artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist/downloads dist/raw
          mkdir -p dist/downloads dist/raw
          gh run download "$GITHUB_RUN_ID" \
            -R "$GITHUB_REPOSITORY" \
            --dir dist/downloads \
            -n derpcat-linux-amd64 \
            -n derpcat-linux-arm64 \
            -n derpcat-darwin-amd64 \
            -n derpcat-darwin-arm64 \
            -n derphole-linux-amd64 \
            -n derphole-linux-arm64 \
            -n derphole-darwin-amd64 \
            -n derphole-darwin-arm64
          for asset in derpcat-linux-amd64 derpcat-linux-arm64 derpcat-darwin-amd64 derpcat-darwin-arm64 derphole-linux-amd64 derphole-linux-arm64 derphole-darwin-amd64 derphole-darwin-arm64; do
            cp "dist/downloads/$asset/$asset" "dist/raw/$asset"
          done
      - name: Verify binary version
        run: |
          for asset in dist/raw/derpcat-linux-amd64 dist/raw/derphole-linux-amd64; do
            chmod +x "$asset"
            test "$("$asset" version)" = "${{ needs.meta.outputs.version }}"
          done
      - name: Package tarballs + checksums
        run: bash ./tools/packaging/build-release-assets.sh
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.version }}
        run: |
          files=(
            dist/release/derpcat-linux-amd64.tar.gz
            dist/release/derpcat-linux-amd64.tar.gz.sha256
            dist/release/derpcat-linux-arm64.tar.gz
            dist/release/derpcat-linux-arm64.tar.gz.sha256
            dist/release/derpcat-darwin-amd64.tar.gz
            dist/release/derpcat-darwin-amd64.tar.gz.sha256
            dist/release/derpcat-darwin-arm64.tar.gz
            dist/release/derpcat-darwin-arm64.tar.gz.sha256
            dist/release/derphole-linux-amd64.tar.gz
            dist/release/derphole-linux-amd64.tar.gz.sha256
            dist/release/derphole-linux-arm64.tar.gz
            dist/release/derphole-linux-arm64.tar.gz.sha256
            dist/release/derphole-darwin-amd64.tar.gz
            dist/release/derphole-darwin-amd64.tar.gz.sha256
            dist/release/derphole-darwin-arm64.tar.gz
            dist/release/derphole-darwin-arm64.tar.gz.sha256
          )
          if gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" -R "$GITHUB_REPOSITORY" "${files[@]}" --clobber
          else
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" "${files[@]}" --verify-tag --generate-notes
          fi

  release-dev:
    name: Publish dev release
    runs-on: ubuntu-latest
    needs: [meta, check, build-binaries, publish-npm-dev]
    if: needs.meta.outputs.is_main == 'true'
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download build artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist/downloads dist/raw
          mkdir -p dist/downloads dist/raw
          gh run download "$GITHUB_RUN_ID" \
            -R "$GITHUB_REPOSITORY" \
            --dir dist/downloads \
            -n derpcat-linux-amd64 \
            -n derpcat-linux-arm64 \
            -n derpcat-darwin-amd64 \
            -n derpcat-darwin-arm64 \
            -n derphole-linux-amd64 \
            -n derphole-linux-arm64 \
            -n derphole-darwin-amd64 \
            -n derphole-darwin-arm64
          for asset in derpcat-linux-amd64 derpcat-linux-arm64 derpcat-darwin-amd64 derpcat-darwin-arm64 derphole-linux-amd64 derphole-linux-arm64 derphole-darwin-amd64 derphole-darwin-arm64; do
            cp "dist/downloads/$asset/$asset" "dist/raw/$asset"
          done
      - name: Verify binary version
        run: |
          for asset in dist/raw/derpcat-linux-amd64 dist/raw/derphole-linux-amd64; do
            chmod +x "$asset"
            test "$("$asset" version)" = "${{ needs.meta.outputs.version }}"
          done
      - name: Package tarballs + checksums
        run: bash ./tools/packaging/build-release-assets.sh
      - name: Update dev tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f dev "$GITHUB_SHA"
          git push -f origin refs/tags/dev
      - name: Publish dev release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          files=(
            dist/release/derpcat-linux-amd64.tar.gz
            dist/release/derpcat-linux-amd64.tar.gz.sha256
            dist/release/derpcat-linux-arm64.tar.gz
            dist/release/derpcat-linux-arm64.tar.gz.sha256
            dist/release/derpcat-darwin-amd64.tar.gz
            dist/release/derpcat-darwin-amd64.tar.gz.sha256
            dist/release/derpcat-darwin-arm64.tar.gz
            dist/release/derpcat-darwin-arm64.tar.gz.sha256
            dist/release/derphole-linux-amd64.tar.gz
            dist/release/derphole-linux-amd64.tar.gz.sha256
            dist/release/derphole-linux-arm64.tar.gz
            dist/release/derphole-linux-arm64.tar.gz.sha256
            dist/release/derphole-darwin-amd64.tar.gz
            dist/release/derphole-darwin-amd64.tar.gz.sha256
            dist/release/derphole-darwin-arm64.tar.gz
            dist/release/derphole-darwin-arm64.tar.gz.sha256
          )
          if gh release view dev -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit dev -R "$GITHUB_REPOSITORY" --title Dev --prerelease
            gh release upload dev -R "$GITHUB_REPOSITORY" "${files[@]}" --clobber
          else
            gh release create dev -R "$GITHUB_REPOSITORY" "${files[@]}" --verify-tag --title Dev --prerelease --latest=false
          fi

  publish-packages-prod:
    name: Build npm artifacts (prod)
    runs-on: ubuntu-latest
    needs: [meta, check, build-binaries]
    if: needs.meta.outputs.is_tag == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Download raw build artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist/downloads dist/raw
          mkdir -p dist/downloads dist/raw
          gh run download "$GITHUB_RUN_ID" \
            -R "$GITHUB_REPOSITORY" \
            --dir dist/downloads \
            -n derpcat-linux-amd64 \
            -n derpcat-linux-arm64 \
            -n derpcat-darwin-amd64 \
            -n derpcat-darwin-arm64 \
            -n derphole-linux-amd64 \
            -n derphole-linux-arm64 \
            -n derphole-darwin-amd64 \
            -n derphole-darwin-arm64
          for asset in derpcat-linux-amd64 derpcat-linux-arm64 derpcat-darwin-amd64 derpcat-darwin-arm64 derphole-linux-amd64 derphole-linux-arm64 derphole-darwin-amd64 derphole-darwin-arm64; do
            cp "dist/downloads/$asset/$asset" "dist/raw/$asset"
          done
      - name: Stage vendored binaries
        run: |
          rm -rf dist/vendor
          stage() {
            local product="$1" asset="$2" triple="$3"
            mkdir -p "dist/vendor/${triple}/${product}"
            cp "dist/raw/${asset}" "dist/vendor/${triple}/${product}/${product}"
            chmod +x "dist/vendor/${triple}/${product}/${product}"
          }
          stage derpcat derpcat-linux-amd64 x86_64-unknown-linux-musl
          stage derpcat derpcat-linux-arm64 aarch64-unknown-linux-musl
          stage derpcat derpcat-darwin-amd64 x86_64-apple-darwin
          stage derpcat derpcat-darwin-arm64 aarch64-apple-darwin
          stage derphole derphole-linux-amd64 x86_64-unknown-linux-musl
          stage derphole derphole-linux-arm64 aarch64-unknown-linux-musl
          stage derphole derphole-darwin-amd64 x86_64-apple-darwin
          stage derphole derphole-darwin-arm64 aarch64-apple-darwin
      - name: Build npm artifact
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          export VERSION
          bash ./tools/packaging/build-npm.sh
      - name: Smoke test packaged launchers
        run: |
          node ./dist/npm-derpcat/bin/derpcat.js version
          node ./dist/npm-derphole/bin/derphole.js version
      - name: Validate npm publish (dry-run)
        run: |
          npm publish ./dist/npm-derpcat --access public --dry-run
          npm publish ./dist/npm-derphole --access public --dry-run
      - name: Package npm artifact
        run: |
          tar -czf dist/npm-packages.tgz -C dist npm-derpcat npm-derphole
      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: package-artifacts-prod
          path: dist/npm-packages.tgz
          if-no-files-found: error

  publish-packages-dev:
    name: Build npm artifacts (dev)
    runs-on: ubuntu-latest
    needs: [meta, check, build-binaries]
    if: needs.meta.outputs.is_main == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Download raw build artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist/downloads dist/raw
          mkdir -p dist/downloads dist/raw
          gh run download "$GITHUB_RUN_ID" \
            -R "$GITHUB_REPOSITORY" \
            --dir dist/downloads \
            -n derpcat-linux-amd64 \
            -n derpcat-linux-arm64 \
            -n derpcat-darwin-amd64 \
            -n derpcat-darwin-arm64 \
            -n derphole-linux-amd64 \
            -n derphole-linux-arm64 \
            -n derphole-darwin-amd64 \
            -n derphole-darwin-arm64
          for asset in derpcat-linux-amd64 derpcat-linux-arm64 derpcat-darwin-amd64 derpcat-darwin-arm64 derphole-linux-amd64 derphole-linux-arm64 derphole-darwin-amd64 derphole-darwin-arm64; do
            cp "dist/downloads/$asset/$asset" "dist/raw/$asset"
          done
      - name: Stage vendored binaries
        run: |
          rm -rf dist/vendor
          stage() {
            local product="$1" asset="$2" triple="$3"
            mkdir -p "dist/vendor/${triple}/${product}"
            cp "dist/raw/${asset}" "dist/vendor/${triple}/${product}/${product}"
            chmod +x "dist/vendor/${triple}/${product}/${product}"
          }
          stage derpcat derpcat-linux-amd64 x86_64-unknown-linux-musl
          stage derpcat derpcat-linux-arm64 aarch64-unknown-linux-musl
          stage derpcat derpcat-darwin-amd64 x86_64-apple-darwin
          stage derpcat derpcat-darwin-arm64 aarch64-apple-darwin
          stage derphole derphole-linux-amd64 x86_64-unknown-linux-musl
          stage derphole derphole-linux-arm64 aarch64-unknown-linux-musl
          stage derphole derphole-darwin-amd64 x86_64-apple-darwin
          stage derphole derphole-darwin-arm64 aarch64-apple-darwin
      - name: Build npm artifact
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          export VERSION
          bash ./tools/packaging/build-npm.sh
      - name: Smoke test packaged launchers
        run: |
          node ./dist/npm-derpcat/bin/derpcat.js version
          node ./dist/npm-derphole/bin/derphole.js version
      - name: Validate npm publish (dry-run)
        run: |
          npm publish ./dist/npm-derpcat --access public --dry-run --tag dev
          npm publish ./dist/npm-derphole --access public --dry-run --tag dev
      - name: Package npm artifact
        run: |
          tar -czf dist/npm-packages.tgz -C dist npm-derpcat npm-derphole
      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: package-artifacts-dev
          path: dist/npm-packages.tgz
          if-no-files-found: error

  publish-npm-prod:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: [check, publish-packages-prod]
    if: needs.publish-packages-prod.result == 'success'
    permissions:
      actions: read
      contents: read
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/derpcat
    steps:
      - name: Download package artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist/downloads
          mkdir -p dist/downloads
          gh run download "$GITHUB_RUN_ID" -R "$GITHUB_REPOSITORY" --dir dist/downloads -n package-artifacts-prod
          pkg=$(find dist/downloads -name npm-packages.tgz -print -quit)
          test -n "$pkg"
          cp "$pkg" dist/npm-packages.tgz
      - name: Unpack npm artifact
        run: tar -xzf dist/npm-packages.tgz -C dist
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish npm packages
        run: |
          bash ./tools/packaging/publish-npm-if-missing.sh ./dist/npm-derpcat
          bash ./tools/packaging/publish-npm-if-missing.sh ./dist/npm-derphole

  publish-npm-dev:
    name: Publish npm package (dev tag)
    runs-on: ubuntu-latest
    needs: [check, publish-packages-dev]
    if: needs.publish-packages-dev.result == 'success'
    permissions:
      actions: read
      contents: read
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/derpcat
    steps:
      - name: Download package artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist/downloads
          mkdir -p dist/downloads
          gh run download "$GITHUB_RUN_ID" -R "$GITHUB_REPOSITORY" --dir dist/downloads -n package-artifacts-dev
          pkg=$(find dist/downloads -name npm-packages.tgz -print -quit)
          test -n "$pkg"
          cp "$pkg" dist/npm-packages.tgz
      - name: Unpack npm artifact
        run: tar -xzf dist/npm-packages.tgz -C dist
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish npm packages (dev tag)
        run: |
          bash ./tools/packaging/publish-npm-if-missing.sh --tag dev ./dist/npm-derpcat
          bash ./tools/packaging/publish-npm-if-missing.sh --tag dev ./dist/npm-derphole
