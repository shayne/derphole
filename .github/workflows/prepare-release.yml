name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to prepare, for example v0.15.6"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: prepare-release-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  prepare-release:
    name: Prepare release tag
    runs-on: macos-15
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Validate release request
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release version must look like vX.Y.Z: $VERSION" >&2
            exit 1
          fi

          git fetch origin main --tags
          git checkout -B main origin/main

          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "tag already exists on origin: $VERSION" >&2
            exit 1
          fi
          if gh release view "$VERSION" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub release already exists: $VERSION" >&2
            exit 1
          fi

          package_version="${VERSION#v}"
          for package in derphole derptun derpssh; do
            if npm view "${package}@${package_version}" version >/dev/null 2>&1; then
              echo "npm package already exists: ${package}@${package_version}" >&2
              exit 1
            fi
          done
      - name: Build SwiftPM framework artifact
        env:
          DERPHOLE_MOBILE_FRAMEWORK_VERSION: ${{ inputs.version }}
        run: mise run swiftpm:framework
      - name: Update Package.swift binary target
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          bash ./tools/packaging/update-swiftpm-binary-target.sh "$VERSION"
          git diff -- Package.swift
      - name: Verify Package.swift binary target
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          checksum="$(swift package compute-checksum dist/swiftpm/DerpholeMobile.xcframework.zip)"
          expected_url="https://github.com/shayne/derphole/releases/download/${VERSION}/DerpholeMobile.xcframework.zip"
          python3 - "$expected_url" "$checksum" <<'PY'
          from pathlib import Path
          import sys

          expected_url, expected_checksum = sys.argv[1:]
          text = Path("Package.swift").read_text()
          start = text.find('        .binaryTarget(\n            name: "DerpholeMobile",')
          if start < 0:
              sys.exit("Package.swift missing DerpholeMobile binary target")
          end = text.find("\n        ),", start)
          if end < 0:
              sys.exit("Package.swift has malformed DerpholeMobile binary target")
          target = text[start:end]
          if expected_url not in target or expected_checksum not in target:
              print("DerpholeMobile SwiftPM binary target does not match prepared artifact", file=sys.stderr)
              print(f"expected url: {expected_url}", file=sys.stderr)
              print(f"expected checksum: {expected_checksum}", file=sys.stderr)
              sys.exit(1)
          PY
      - name: Commit SwiftPM manifest and tag release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          if git diff --cached --quiet; then
            echo "Package.swift already matches ${VERSION}; tagging current main"
          else
            git commit -m "build: prepare ${VERSION} SwiftPM target"
          fi
          git tag -a "$VERSION" -m "$VERSION"
          git push origin HEAD:main
          git push origin "refs/tags/${VERSION}"
      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          gh workflow run release.yml -R "$GITHUB_REPOSITORY" --ref "$VERSION" -f version="$VERSION"
