[tools]
go = "1.26.1"

[tasks.test]
run = "go test ./..."

[tasks.build]
run = "mkdir -p dist && go build -o dist/derpcat ./cmd/derpcat"

[tasks.build-linux-amd64]
run = "mkdir -p dist && GOOS=linux GOARCH=amd64 go build -o dist/derpcat-linux-amd64 ./cmd/derpcat"

[tasks.smoke-local]
run = "./scripts/smoke-local.sh"

[tasks.smoke-remote]
run = "./scripts/smoke-remote.sh hetz"

[tasks.smoke-remote-relay]
run = "./scripts/smoke-remote-relay.sh hetz"

[tasks.smoke-remote-tcp]
run = "./scripts/smoke-remote-tcp.sh hetz"

[tasks.promotion-1g-hetz]
run = "./scripts/promotion-test.sh hetz 1024"

[tasks.promotion-1g-pve1]
run = "./scripts/promotion-test.sh pve1 1024"
