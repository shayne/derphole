[tools]
go = "1.26.1"
node = "24"
pre-commit = "latest"
staticcheck = "latest"

[tasks.test]
run = "go test ./..."

[tasks.vet]
run = "go vet ./..."

[tasks."check:hooks"]
run = "pre-commit run --all-files"

[tasks.check]
shell = "bash -c"
run = """
set -euo pipefail
mise run check:hooks
mise run build
mise run test
"""

[tasks.install-githooks]
description = "Install git hooks via pre-commit"
shell = "bash -c"
run = """
set -euo pipefail
git config --local --unset core.hooksPath || true
pre-commit install --install-hooks --hook-type pre-commit --hook-type prepare-commit-msg
"""

[tasks.build]
run = "mkdir -p dist && go build -o dist/derpcat ./cmd/derpcat"

[tasks.build-linux-amd64]
run = "mkdir -p dist && GOOS=linux GOARCH=amd64 go build -o dist/derpcat-linux-amd64 ./cmd/derpcat"

[tasks."release:build-vendor"]
run = "bash ./tools/packaging/build-vendor.sh"

[tasks."release:build-npm"]
run = "bash ./tools/packaging/build-npm.sh"

[tasks."release:package-assets"]
run = "bash ./tools/packaging/build-release-assets.sh"

[tasks."release:npm-dry-run"]
shell = "bash -c"
run = """
set -euo pipefail
bash ./tools/packaging/build-vendor.sh
bash ./tools/packaging/build-npm.sh
pkg_version="$(node -e 'process.stdout.write(require("./dist/npm/package.json").version)')"
if [[ "$pkg_version" =~ ^[0-9]+\\.[0-9]+\\.[0-9]+-.+ ]]; then
  npm publish ./dist/npm --access public --dry-run --tag dev
else
  npm publish ./dist/npm --access public --dry-run
fi
"""

[tasks."release:smoke"]
run = "bash ./scripts/release-package-smoke.sh"

[tasks."release:build-all"]
shell = "bash -c"
run = """
set -euo pipefail
mkdir -p dist/raw
bash ./tools/packaging/build-vendor.sh
cp dist/vendor/x86_64-unknown-linux-musl/derpcat/derpcat dist/raw/derpcat-linux-amd64
cp dist/vendor/aarch64-unknown-linux-musl/derpcat/derpcat dist/raw/derpcat-linux-arm64
cp dist/vendor/x86_64-apple-darwin/derpcat/derpcat dist/raw/derpcat-darwin-amd64
cp dist/vendor/aarch64-apple-darwin/derpcat/derpcat dist/raw/derpcat-darwin-arm64
bash ./tools/packaging/build-release-assets.sh
bash ./tools/packaging/build-npm.sh
"""

[tasks.smoke-local]
run = "./scripts/smoke-local.sh"

[tasks.smoke-remote]
shell = "bash -c"
run = """
set -euo pipefail
: "${REMOTE_HOST:?set REMOTE_HOST to a reachable SSH host}"
./scripts/smoke-remote.sh "${REMOTE_HOST}"
"""

[tasks.smoke-remote-relay]
shell = "bash -c"
run = """
set -euo pipefail
: "${REMOTE_HOST:?set REMOTE_HOST to a reachable SSH host}"
./scripts/smoke-remote-relay.sh "${REMOTE_HOST}"
"""

[tasks.smoke-remote-share]
shell = "bash -c"
run = """
set -euo pipefail
: "${REMOTE_HOST:?set REMOTE_HOST to a reachable SSH host}"
./scripts/smoke-remote-share.sh "${REMOTE_HOST}"
"""

[tasks.promotion-1g]
shell = "bash -c"
run = """
set -euo pipefail
: "${REMOTE_HOST:?set REMOTE_HOST to a reachable SSH host}"
./scripts/promotion-test.sh "${REMOTE_HOST}" 1024
"""
