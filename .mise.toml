[tools]
go = "1.26.1"
node = "24"
pre-commit = "latest"
staticcheck = "latest"

[tasks.test]
run = "go test ./..."

[tasks.vet]
run = "go vet ./..."

[tasks."check:hooks"]
run = "pre-commit run --all-files"

[tasks.check]
shell = "bash -c"
run = """
set -euo pipefail
mise run check:hooks
mise run build
mise run test
"""

[tasks.install-githooks]
description = "Install git hooks via pre-commit"
shell = "bash -c"
run = """
set -euo pipefail
git config --local --unset core.hooksPath || true
pre-commit install --install-hooks --hook-type pre-commit --hook-type prepare-commit-msg
"""

[tasks.build]
shell = "bash -c"
run = """
set -euo pipefail
mkdir -p dist
go build -o dist/derphole ./cmd/derphole
go build -o dist/derptun ./cmd/derptun
"""

[tasks."apple:build"]
description = "Build the Derphole iOS app"
shell = "bash -c"
run = """
set -euo pipefail
mise run apple:mobile-framework
apple_build_dir="${APPLE_BUILD_DIR:-$PWD/dist/apple-build}"
vvterm_vendor_root="${VVTERM_VENDOR_ROOT:-/Users/shayne/code/vvterm/Vendor}"
if [[ ! -d "${vvterm_vendor_root}/libghostty" || ! -d "${vvterm_vendor_root}/libssh2" ]]; then
  echo "VVTerm vendor libraries not found; set VVTERM_VENDOR_ROOT to a directory containing libghostty and libssh2." >&2
  exit 1
fi
xcodebuild -quiet build \
  -project apple/Derphole/Derphole.xcodeproj \
  -target Derphole \
  -configuration "${APPLE_CONFIGURATION:-Debug}" \
  -sdk "${APPLE_SDK:-iphonesimulator}" \
  CODE_SIGNING_ALLOWED="${CODE_SIGNING_ALLOWED:-NO}" \
  VVTERM_VENDOR_ROOT="${vvterm_vendor_root}" \
  SYMROOT="${apple_build_dir}/Products" \
  OBJROOT="${apple_build_dir}/Intermediates"
"""

[tasks."apple:test"]
description = "Run the Derphole iOS tests"
shell = "bash -c"
run = """
set -euo pipefail
mise run apple:mobile-framework
test_destination="${APPLE_TEST_DESTINATION:-}"
if [[ -z "$test_destination" ]]; then
  test_device_name="${APPLE_TEST_DEVICE:-iPhone 17}"
  test_device="$(xcrun simctl list devices available | awk -v wanted="$test_device_name" '/^[[:space:]]+iPhone/ || /^[[:space:]]+iPad/ { line=$0; sub(/^[[:space:]]+/, "", line); sub(/[[:space:]]+[(].*/, "", line); if (line == wanted) { print line; exit } }')"
  if [[ -z "$test_device" ]]; then
    test_device="$(xcrun simctl list devices available | awk '(/^[[:space:]]+iPhone/ || /^[[:space:]]+iPad/) && /[(]Booted[)]/ { sub(/^[[:space:]]+/, ""); sub(/[[:space:]]+[(].*/, ""); print; exit }')"
  fi
  if [[ -z "$test_device" ]]; then
    test_device="$(xcrun simctl list devices available | awk '/^[[:space:]]+iPhone/ || /^[[:space:]]+iPad/ { sub(/^[[:space:]]+/, ""); sub(/[[:space:]]+[(].*/, ""); print; exit }')"
  fi
  if [[ -z "$test_device" ]]; then
    echo "No available iOS Simulator devices found; install an iOS simulator or set APPLE_TEST_DESTINATION." >&2
    exit 1
  fi
  test_destination="platform=iOS Simulator,name=${test_device}"
fi
vvterm_vendor_root="${VVTERM_VENDOR_ROOT:-/Users/shayne/code/vvterm/Vendor}"
if [[ ! -d "${vvterm_vendor_root}/libghostty" || ! -d "${vvterm_vendor_root}/libssh2" ]]; then
  echo "VVTerm vendor libraries not found; set VVTERM_VENDOR_ROOT to a directory containing libghostty and libssh2." >&2
  exit 1
fi
xcodebuild -quiet test \
  -project apple/Derphole/Derphole.xcodeproj \
  -scheme Derphole \
  -configuration "${APPLE_CONFIGURATION:-Debug}" \
  -destination "$test_destination" \
  -derivedDataPath "${APPLE_DERIVED_DATA:-dist/apple-derived-data}" \
  VVTERM_VENDOR_ROOT="${vvterm_vendor_root}" \
  CODE_SIGNING_ALLOWED="${CODE_SIGNING_ALLOWED:-NO}"
"""

[tasks."apple:physical-transfer"]
description = "Run a live CLI-to-physical-iPhone transfer test"
run = "bash ./scripts/apple-physical-transfer.sh"

[tasks."apple:web-tunnel"]
description = "Run a live CLI-to-iOS-simulator web tunnel test"
run = "bash ./scripts/apple-web-tunnel.sh"

[tasks."apple:ssh-tunnel"]
description = "Run a live CLI-to-iOS-simulator SSH tunnel terminal test"
run = "bash ./scripts/apple-ssh-tunnel.sh"

[tasks."apple:mobile-tools"]
description = "Install gomobile tools into dist/tools/bin"
shell = "bash -c"
run = """
set -euo pipefail
tools_bin="$PWD/dist/tools/bin"
tools_gopath="$PWD/dist/tools/.gopath"
tools_mod="$PWD/dist/tools/gomobile.mod"
gomobile_version="${GOMOBILE_VERSION:-v0.0.0-20260410095206-2cfb76559b7b}"
mkdir -p "$tools_bin" "$tools_gopath/pkg/gomobile"
GOBIN="$tools_bin" GOPATH="$tools_gopath" go install "golang.org/x/mobile/cmd/gomobile@$gomobile_version"
GOBIN="$tools_bin" GOPATH="$tools_gopath" go install "golang.org/x/mobile/cmd/gobind@$gomobile_version"
cp go.mod "$tools_mod"
cp go.sum "$PWD/dist/tools/gomobile.sum"
GOFLAGS="-modfile=$tools_mod -mod=mod" go get "golang.org/x/mobile@$gomobile_version"
GOFLAGS="-modfile=$tools_mod -mod=mod" go list golang.org/x/mobile/bind golang.org/x/mobile/bind/objc golang.org/x/mobile/cmd/gomobile golang.org/x/mobile/cmd/gobind >/dev/null
"""

[tasks."apple:mobile-framework"]
description = "Build the DerpholeMobile iOS XCFramework"
depends = ["apple:mobile-tools"]
shell = "bash -c"
run = """
set -euo pipefail
tools_mod="$PWD/dist/tools/gomobile.mod"
tools_gopath="$PWD/dist/tools/.gopath"
mkdir -p dist/apple
PATH="$PWD/dist/tools/bin:$PATH" GOPATH="$tools_gopath" GOFLAGS="-modfile=$tools_mod -mod=mod" gomobile bind \
  -target=ios,iossimulator \
  -iosversion "${APPLE_IOS_VERSION:-17.0}" \
  -o dist/apple/DerpholeMobile.xcframework \
  ./pkg/derpholemobile
"""

[tasks.build-linux-amd64]
shell = "bash -c"
run = """
set -euo pipefail
mkdir -p dist
GOOS=linux GOARCH=amd64 go build -o dist/derphole-linux-amd64 ./cmd/derphole
GOOS=linux GOARCH=amd64 go build -o dist/derptun-linux-amd64 ./cmd/derptun
"""

[tasks."release:build-vendor"]
run = "bash ./tools/packaging/build-vendor.sh"

[tasks."release:build-npm"]
run = "bash ./tools/packaging/build-npm.sh"

[tasks."build-web"]
run = "bash ./tools/packaging/build-web.sh"

[tasks."release:package-assets"]
run = "bash ./tools/packaging/build-release-assets.sh"

[tasks."release:npm-dry-run"]
shell = "bash -c"
run = """
set -euo pipefail
bash ./tools/packaging/build-vendor.sh
bash ./tools/packaging/build-npm.sh
for product in derphole derptun; do
  pkg_version="$(node -e "process.stdout.write(require('./dist/npm-${product}/package.json').version)")"
  if [[ "$pkg_version" =~ ^[0-9]+\\.[0-9]+\\.[0-9]+-.+ ]]; then
    npm publish "./dist/npm-${product}" --access public --dry-run --tag dev
  else
    npm publish "./dist/npm-${product}" --access public --dry-run
  fi
done
"""

[tasks."release:smoke"]
run = "bash ./scripts/release-package-smoke.sh"

[tasks."release:build-all"]
shell = "bash -c"
run = """
set -euo pipefail
rm -rf dist/raw
mkdir -p dist/raw
bash ./tools/packaging/build-vendor.sh
for product in derphole derptun; do
  cp "dist/vendor/x86_64-unknown-linux-musl/${product}/${product}" "dist/raw/${product}-linux-amd64"
  cp "dist/vendor/aarch64-unknown-linux-musl/${product}/${product}" "dist/raw/${product}-linux-arm64"
  cp "dist/vendor/x86_64-apple-darwin/${product}/${product}" "dist/raw/${product}-darwin-amd64"
  cp "dist/vendor/aarch64-apple-darwin/${product}/${product}" "dist/raw/${product}-darwin-arm64"
done
bash ./tools/packaging/build-release-assets.sh
bash ./tools/packaging/build-npm.sh
bash ./tools/packaging/build-web.sh
"""

[tasks.smoke-local]
run = "./scripts/smoke-local.sh"

[tasks.smoke-remote]
shell = "bash -c"
run = """
set -euo pipefail
: "${REMOTE_HOST:?set REMOTE_HOST to a reachable SSH host}"
./scripts/smoke-remote.sh "${REMOTE_HOST}"
"""

[tasks.smoke-remote-relay]
shell = "bash -c"
run = """
set -euo pipefail
: "${REMOTE_HOST:?set REMOTE_HOST to a reachable SSH host}"
./scripts/smoke-remote-relay.sh "${REMOTE_HOST}"
"""

[tasks.smoke-remote-share]
shell = "bash -c"
run = """
set -euo pipefail
: "${REMOTE_HOST:?set REMOTE_HOST to a reachable SSH host}"
./scripts/smoke-remote-share.sh "${REMOTE_HOST}"
"""

[tasks.smoke-remote-derptun]
shell = "bash -c"
run = """
set -euo pipefail
: "${REMOTE_HOST:?set REMOTE_HOST to a reachable SSH host}"
./scripts/smoke-remote-derptun.sh "${REMOTE_HOST}"
"""

[tasks.promotion-1g]
shell = "bash -c"
run = """
set -euo pipefail
: "${REMOTE_HOST:?set REMOTE_HOST to a reachable SSH host}"
./scripts/promotion-test.sh "${REMOTE_HOST}" 1024
"""
